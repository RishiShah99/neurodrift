# @package _global_
# Phase 4 — feed-forward 3D Gaussian-splat decoder, v0 curriculum on FROZEN GT latents.
# The decoder consumes a latent z and renders orthogonal mid-slices; the loss matches
# those against GT slices (L1 + DSSIM + TV). Automatic optimisation + plain DDP, the
# same rock-solid no-GAN path as the VAE flagship.
defaults:
  - /data: latents_v0
  - /model: gsdecoder_v0
  - /trainer: eight_b200_auto
  - _self_

experiment_name: gsdecoder_v0

# NOTE: the real GT-slice dataloader (z + axial/coronal/sagittal target mid-slices)
# is future work — it gets wired when the VAE-decoded slices land. `/data: latents_v0`
# above provides the latent z (the decoder's input) so this config composes today, but
# the GSDecoder batch contract is {"z", "slices", "mask"} and latents_v0 does NOT yet
# emit "slices"/"mask". Extend the latent datamodule (or add a slices loader) before
# launching a real cook.

litmodule:
  _target_: neurodrift.train.gsdecoder_module.GSDecoderLitModule
  # Structural term weight (2D Gaussian-window DSSIM) and a mild TV smoothness prior.
  dssim_weight: 0.5
  tv_weight: 0.01
  # Slices live in the decoder's normalised [-1, 1] intensity range.
  data_range: 2.0
  # CPU/preflight uses the pure-torch reference rasteriser; flip true on the CUDA box.
  use_gsplat: false

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-4

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  # Placeholder only — GSDecoderLitModule pins T_max to the real planned step count at
  # runtime (estimated_stepping_batches). Change max_epochs, not this.
  T_max: 100000
  eta_min: 1.0e-6
