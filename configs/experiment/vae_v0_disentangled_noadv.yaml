# @package _global_
# v0 flagship (no-GAN): content/style disentangled VAE on the rock-solid automatic-
# optimization + plain-DDP path. This is the PRIMARY architectural win (the fusion-
# bottleneck fix); prior art says it should reach ~24-26 dB cross-modal on its own.
# The adversarial term (vae_v0_disentangled) is deferred to a separate isolated phase
# because manual-opt GAN-under-DDP deadlocked. If this stalls near 19 dB, the cap is
# residual intra-subject registration (HANDOFF E7), not the objective.
defaults:
  - vae_v0_disentangled
  - override /trainer: eight_b200_auto
  - _self_

experiment_name: vae_v0_disentangled_noadv

litmodule:
  use_adversarial: false

# Runtime cap. multimodal_oversample=8 DUPLICATES multimodal subjects 8x into the train
# set (DDP-safe oversampling baked into the dataset), so an epoch is ~8x a single pass:
# 23,513 train groups -> ~1,470 steps/epoch at batch 2 x 8 GPUs. ~20 of these fat epochs
# already exceeds the multimodal (cross-modal) gradient updates of the old converged
# 95-epoch run, and fits the originally-budgeted ~20h. (max_epochs=100 here is ~95h /
# ~$4k on spot — do NOT.)
#
# max_epochs is the SINGLE knob. The LitModule pins the cosine scheduler's T_max to the
# actual planned step count (estimated_stepping_batches = epochs x steps/epoch) at
# runtime, so the LR anneals to eta_min exactly at the end with no hand-computed T_max
# to keep in sync. The scheduler.T_max in vae_v0_disentangled is only a placeholder the
# runtime overrides (see DisentangledVAELitModule._build_scheduler) — setting it here
# would do NOTHING, so don't. If the corpus/oversample/devices change, just set epochs.
trainer:
  max_epochs: 20
