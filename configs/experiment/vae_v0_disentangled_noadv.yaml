# @package _global_
# v0 flagship (no-GAN): content/style disentangled VAE on the rock-solid automatic-
# optimization + plain-DDP path. This is the PRIMARY architectural win (the fusion-
# bottleneck fix); prior art says it should reach ~24-26 dB cross-modal on its own.
# The adversarial term (vae_v0_disentangled) is deferred to a separate isolated phase
# because manual-opt GAN-under-DDP deadlocked. If this stalls near 19 dB, the cap is
# residual intra-subject registration (HANDOFF E7), not the objective.
defaults:
  - vae_v0_disentangled
  - override /trainer: eight_b200_auto
  - _self_

experiment_name: vae_v0_disentangled_noadv

litmodule:
  use_adversarial: false
