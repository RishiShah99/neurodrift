# Phase 1 — multimodal 3D VAE on the day-1 corpus.
defaults:
  - /data: oasis3
  - /model: vae3d
  - /trainer: single_gpu
  - _self_

experiment_name: vae_phase1
optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-4

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100000
  eta_min: 1.0e-6
