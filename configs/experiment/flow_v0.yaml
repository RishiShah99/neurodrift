# @package _global_
# v0 Phase 2 — lifespan flow backbone over the frozen VAE latents. Rectified-flow /
# linear stochastic interpolant velocity model (MM-DiT, 3D RoPE, adaLN-zero) on the
# rock-solid automatic-optimization + plain-DDP path (the same one the v0 VAE cook
# validated; NO manual-opt / GAN / find_unused). Age is the live conditioning signal;
# the categoricals are null-trained slots for later.
defaults:
  - /data: latents_v0
  - /model: flow_v0
  - /trainer: eight_b200_auto
  - _self_

experiment_name: flow_v0

litmodule:
  _target_: neurodrift.train.flow_module.FlowLitModule
  cfg_dropout_p: 0.1

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-4

# Cosine schedule. T_max here is only a placeholder — FlowLitModule pins it to the
# real planned step count (estimated_stepping_batches) at runtime, so the LR anneals
# to eta_min exactly at the end. Editing this T_max does NOTHING; set trainer.max_epochs.
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100000
  eta_min: 1.0e-6
