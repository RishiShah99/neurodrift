# @package _global_
# v0 Phase 1 — multimodal 3D VAE on the walk-up corpus.
defaults:
  - /data: v0_walkup
  - /model: vae3d
  - /trainer: single_gpu
  - _self_

experiment_name: vae_v0

litmodule:
  _target_: neurodrift.train.lightning_module.VAELitModule
  kl_warmup_steps: 5000
  perceptual_weight: 0.1
  cycle_weight: 0.5
  use_perceptual: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-4

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100000
  eta_min: 1.0e-6
