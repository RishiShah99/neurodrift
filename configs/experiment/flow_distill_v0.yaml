# @package _global_
# v0 Phase 3 — 1-step distillation of the lifespan flow (the demo's fast path).
# Student = the flow_v0 MM-DiT geometry at HALF depth (PLAN §5: "same dim, half the
# depth"); teacher = the full trained flow_v0, frozen, loaded from its checkpoint.
# Endpoint distillation: student maps noise -> teacher's 50-step ODE endpoint in ONE
# step. Same data module so the student is distilled over the real age distribution.
defaults:
  - /data: latents_v0
  - /model: flow_v0
  - /trainer: eight_b200_auto
  - _self_

experiment_name: flow_distill_v0

# Student overrides: half the teacher's depth (12 -> 6); every other dim matches so the
# 1-step map lives in the same latent geometry.
model:
  depth: 6

litmodule:
  _target_: neurodrift.train.distill_module.FlowDistillLitModule
  teacher_ckpt: ${oc.env:NEURODRIFT_TEACHER_CKPT,out/flow_v0/ckpt/last.ckpt}
  num_teacher_steps: 50
  prefer_ema_teacher: true
  ema_decay: 0.999
  # Full teacher geometry (matches configs/model/flow_v0.yaml). Instantiated + frozen in
  # the LitModule; stripped from saved student checkpoints (reloaded from teacher_ckpt).
  teacher_model:
    _target_: neurodrift.models.flow.MMDiT3D
    latent_channels: 16
    latent_size: 32
    patch_size: 2
    hidden: 768
    depth: 12
    heads: 12
    num_register_tokens: 4
    cardinalities:
      sex: 2
      dx: 4
      apoe: 6
      treatment: 6
      cohort: 8
    cfg_dropout_p: 0.1

optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-4

# Cosine schedule. T_max is a placeholder — the LitModule pins it to the real planned
# step count at runtime. Set trainer.max_epochs to change training length.
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 100000
  eta_min: 1.0e-6
