# Top-level Hydra config. `scripts/train.py` composes from here.
defaults:
  - _self_
  - experiment: vae_v0

seed: 1337
output_dir: ${oc.env:NEURODRIFT_OUT,./out}/${experiment_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Stable (NOT timestamped) checkpoint dir keyed by experiment, so a spot box that
# gets preempted and relaunched resumes itself from last.ckpt.
ckpt_dir: ${oc.env:NEURODRIFT_OUT,./out}/${experiment_name}/ckpt
# Resume control: "last"/"auto" resumes from ckpt_dir/last.ckpt if it exists else
# starts fresh; null/"none" always starts fresh; or pass an explicit ckpt path.
ckpt_path: last

# Local TensorBoard logging. Set false for unit-test fast_dev_run.
log_to_tensorboard: true

# Single-process eval (scripts/eval.py). Canonical v0 metrics; the live DDP
# epoch metrics are per-rank-local and not trustworthy for the post.
eval:
  ckpt: null          # path to a Lightning or bare state-dict checkpoint
  max_batches: null   # cap val batches for a quick smoke; null = full val set
  cross_modal: true   # also compute the T1->T2-style synthesis matrix

# Early stopping (patience). When enabled, training halts once `monitor` stops improving
# by `min_delta` for `patience` validation checks, so a converged run exits cleanly and
# scripts/cook_and_finalize.sh proceeds to eval+archive instead of burning GPU to
# max_epochs. `patience` is in VAL CHECKS (trainer.val_check_interval=0.25 -> 4/epoch, so
# patience 8 ~= 2 epochs). min_delta ignores sub-1e-3 noise wiggles. strict=false so it
# no-ops (rather than erroring) on experiments that don't log `monitor`.
early_stopping:
  enabled: true
  monitor: val/loss
  mode: min
  patience: 8
  min_delta: 1.0e-3
  strict: false

hydra:
  run:
    dir: ${output_dir}
  sweep:
    dir: ${oc.env:NEURODRIFT_OUT,./out}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false
