# v0 walk-up corpus: IXI + ABIDE + OpenNeuro bulk (Zarr cache in GCS).
_target_: neurodrift.train.data_module.ZarrMultimodalDataModule

zarr_root: ${oc.env:NEURODRIFT_ZARR_ROOT,gs://neurodrift-data/zarr}
cohorts: [ixi, abide, openneuro]
modalities: [T1w, T2w, PDw, dwi]
image_size: 128
batch_size: 2
num_workers: 4
val_fraction: 0.05
modality_dropout_p: 0.3
seed: 1337
